name: Test & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress production run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build

  build:
    name: Build site for Pages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
      # base_path is "/<repo>" for project sites, "" for user/org root sites.
      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          VITE_API_BASE: https://api.meshcore.ninja
      # Single source of the github-pages artifact.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
